<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding QR Generator</title>
    <style>
      :root {
        --bg: #f1eadf;
        --ink: #1f1a17;
        --panel: #fffdf9;
        --line: #e7dccc;
        --button-bg: #1f140f;
        --button-text: #fff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 92% 10%, #ecdcc9 0%, transparent 30%),
          radial-gradient(circle at 8% 12%, #ead7c1 0%, transparent 26%),
          var(--bg);
        color: var(--ink);
        min-height: 100vh;
        padding: 20px;
      }
      .panel {
        width: min(920px, 100%);
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 22px;
        box-shadow: 0 18px 40px rgba(38, 24, 13, 0.09);
      }
      h1 {
        margin: 0 0 10px;
        font-family: "Didot", "Bodoni MT", serif;
        font-size: clamp(1.8rem, 3.4vw, 2.7rem);
      }
      .note { color: #63564b; margin: 0 0 12px; }
      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #d9cab8;
        padding: 11px 12px;
        font: inherit;
      }
      .buttons { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
      button {
        border: 0;
        background: var(--button-bg);
        color: var(--button-text);
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .qr-wrap {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        align-items: center;
      }
      .canvas-ring {
        background: linear-gradient(180deg, #f7ead9, #fff8ef);
        border: 2px solid #dfc4a9;
        border-radius: 20px;
        padding: 12px;
        width: fit-content;
      }
      canvas {
        background: #fff;
        border-radius: 12px;
      }
      @media (min-width: 760px) {
        .qr-wrap { grid-template-columns: auto 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1 data-text-key="qr_title">Wedding QR Code</h1>
      <p class="note" data-text-key="qr_note">Paste the public upload page URL (where guests should land after scanning).</p>
      <input id="urlInput" data-placeholder-key="qr_url_placeholder" placeholder="https://yourdomain.com/wedding-upload/" />
      <div class="buttons">
        <button id="generateBtn" type="button" data-text-key="qr_generate_button">Generate QR</button>
        <button id="downloadBtn" type="button" disabled data-text-key="qr_download_button">Download PNG</button>
      </div>

      <section class="qr-wrap">
        <div class="canvas-ring">
          <canvas id="qrCanvas" width="360" height="360" aria-label="QR code"></canvas>
        </div>
        <div class="note" data-text-key="qr_tip">Tip: print this at 6x6 inches or larger for easy scanning.</div>
      </section>
    </main>

    <script src="./wedding-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script>
      const cfg = window.WEDDING_CONFIG || {};
      const urlInput = document.getElementById("urlInput");
      const generateBtn = document.getElementById("generateBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const canvas = document.getElementById("qrCanvas");

      const draw = async () => {
        const text = (urlInput.value || "").trim();
        if (!text) return;

        await QRCode.toCanvas(canvas, text, {
          width: 360,
          margin: 2,
          color: {
            dark: "#1f1a16",
            light: "#ffffff",
          },
        });
        downloadBtn.disabled = false;
      };

      if (cfg.guestUploadUrl && /^https?:\/\//i.test(cfg.guestUploadUrl)) {
        urlInput.value = cfg.guestUploadUrl;
        draw();
      }

      generateBtn.addEventListener("click", draw);

      downloadBtn.addEventListener("click", () => {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = "wedding-upload-qr.png";
        link.click();
      });
    </script>
    <script src="./ui-customizer.js"></script>
  </body>
</html>
