<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding QR Poster</title>
    <style>
      :root {
        --ink: #1f1712;
        --paper: #fffdf9;
        --accent: #a7632f;
        --bg: #f2eadf;
        --button-bg: #1f140f;
        --button-text: #fff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 10%, #ebd8c3 0%, transparent 35%),
          radial-gradient(circle at 90% 5%, #efdfcf 0%, transparent 30%),
          var(--bg);
        min-height: 100vh;
        padding: 20px;
      }
      .wrap {
        width: min(940px, 100%);
        margin: 0 auto;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }
      button {
        border: 0;
        background: var(--button-bg);
        color: var(--button-text);
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .poster {
        background: var(--paper);
        border: 1px solid #e8dbc9;
        border-radius: 24px;
        padding: 34px;
        display: grid;
        gap: 14px;
        justify-items: center;
        text-align: center;
        box-shadow: 0 20px 42px rgba(44, 24, 12, 0.1);
      }
      .badge {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.76rem;
        color: #7c4c2f;
        border: 1px solid #edcfb2;
        background: #f9ebdc;
        border-radius: 999px;
        padding: 6px 10px;
      }
      h1 {
        margin: 0;
        font-family: "Didot", "Bodoni MT", serif;
        font-size: clamp(2.1rem, 5vw, 3.6rem);
        line-height: 1.08;
      }
      .line { margin: 0; color: #5f4c40; font-size: clamp(1rem, 2vw, 1.2rem); }
      .ring {
        padding: 14px;
        background: linear-gradient(180deg, #f9efdf, #fff9f0);
        border: 2px solid #e2c8ad;
        border-radius: 22px;
      }
      canvas { background: #fff; border-radius: 12px; }
      .tip { margin: 0; color: #6a5749; }
      .url { margin: 0; color: #8b7869; font-size: 0.84rem; word-break: break-all; }
      @media print {
        body { background: #fff; padding: 0; }
        .controls { display: none; }
        .poster {
          box-shadow: none;
          border: 0;
          border-radius: 0;
          min-height: 100vh;
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="controls">
        <button type="button" id="refreshBtn" data-text-key="poster_refresh_button">Refresh QR</button>
        <button type="button" id="printBtn" data-text-key="poster_print_button">Print Poster</button>
      </section>

      <section class="poster">
        <div class="badge">Scan & Share</div>
        <h1 id="posterTitle" data-text-key="poster_title">Scan to Share Your Wedding Photos</h1>
        <p class="line" id="posterSubtitle" data-text-key="poster_subtitle">Upload your pictures and videos to our live album.</p>
        <div class="ring">
          <canvas id="qrCanvas" width="420" height="420" aria-label="Wedding upload QR"></canvas>
        </div>
        <p class="tip" data-text-key="poster_tip">Keep your camera steady 1-2 feet away to scan quickly.</p>
        <p class="url" id="urlText"></p>
      </section>
    </main>

    <script src="./wedding-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script>
      const cfg = window.WEDDING_CONFIG || {};
      const canvas = document.getElementById("qrCanvas");
      const posterTitle = document.getElementById("posterTitle");
      const posterSubtitle = document.getElementById("posterSubtitle");
      const urlText = document.getElementById("urlText");
      const refreshBtn = document.getElementById("refreshBtn");
      const printBtn = document.getElementById("printBtn");

      const uploadUrl = cfg.guestUploadUrl || "";

      if (cfg.coupleNames) {
        posterTitle.textContent = `Scan to Share Photos for ${cfg.coupleNames}`;
      }
      if (cfg.welcomeMessage) {
        posterSubtitle.textContent = cfg.welcomeMessage;
      }

      const draw = async () => {
        if (!uploadUrl) {
          urlText.textContent = "Set guestUploadUrl in wedding-config.js first.";
          return;
        }
        await QRCode.toCanvas(canvas, uploadUrl, {
          width: 420,
          margin: 2,
          color: { dark: "#1e1611", light: "#ffffff" },
        });
        urlText.textContent = uploadUrl;
      };

      refreshBtn.addEventListener("click", draw);
      printBtn.addEventListener("click", () => window.print());
      draw();
    </script>
    <script src="./ui-customizer.js"></script>
  </body>
</html>
