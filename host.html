<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Wedding Host Dashboard</title>
    <style>
      :root {
        --bg: #efe8de;
        --card: #fffdf9;
        --ink: #1f1a17;
        --muted: #665b51;
        --line: #e5d8c7;
        --button-bg: #1f140f;
        --button-text: #fff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 6% 8%, #ead8c4 0%, transparent 32%),
          radial-gradient(circle at 92% 2%, #eadbcf 0%, transparent 30%),
          linear-gradient(180deg, #f5f0e8, var(--bg));
        min-height: 100vh;
        padding: max(16px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      }

      .shell {
        width: min(1120px, 100%);
        margin: 0 auto;
        animation: rise 420ms ease;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: clamp(16px, 2.5vw, 28px);
        box-shadow: 0 18px 44px rgba(44, 26, 14, 0.09);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-family: "Didot", "Bodoni MT", serif;
        font-size: clamp(1.8rem, 3.1vw, 2.7rem);
      }

      .muted { color: var(--muted); }

      .row {
        display: grid;
        gap: 8px;
        background: #fff;
        border: 1px solid #ece1d2;
        border-radius: 14px;
        padding: 12px;
        margin-top: 14px;
      }

      .auth {
        margin-top: 14px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      input {
        min-width: 250px;
        border-radius: 12px;
        border: 1px solid #d8cab9;
        padding: 11px 12px;
        font: inherit;
        min-height: 46px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        min-height: 46px;
        font-weight: 700;
        cursor: pointer;
        color: var(--button-text);
        background: var(--button-bg);
      }

      .toolbar {
        margin: 12px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid #e9dece;
        border-radius: 14px;
        overflow: hidden;
        background: #fff;
      }

      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #f1e7da;
        font-size: 0.95rem;
      }

      th {
        background: #fbf5ec;
        font-size: 0.86rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .hidden { display: none; }
      .empty { margin-top: 10px; }
      a { color: #6a4329; }

      @media (max-width: 760px) {
        body {
          padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
            max(14px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        }

        .card {
          border-radius: 18px;
          padding: 14px;
        }

        .auth {
          display: grid;
          grid-template-columns: 1fr;
        }

        .auth input,
        .auth button {
          width: 100%;
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td { display: block; }
        th { display: none; }
        tr { border-bottom: 1px solid #f0e6d9; padding: 8px 0; }
        td { border-bottom: 0; padding: 5px 10px; }
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="top">
          <div>
            <h1 id="title" data-text-key="host_title">Wedding Host Dashboard</h1>
            <p class="muted" data-text-key="host_subtitle">Protected view for pulling original files from your own storage bucket.</p>
          </div>
        </div>

        <div class="row">
          <strong data-text-key="host_guest_label">Guest Upload URL</strong>
          <span id="guestUrl" class="muted"></span>
          <a id="guestLink" href="#" target="_blank" rel="noreferrer" data-text-key="host_guest_link">Open guest page</a>
        </div>

        <div class="auth">
          <input id="codeInput" type="password" data-placeholder-key="host_code_placeholder" placeholder="Enter host access code" />
          <button id="continueBtn" type="button" data-text-key="host_continue_button">Continue</button>
          <button id="refreshBtn" type="button" class="hidden" data-text-key="host_refresh_button">Refresh</button>
          <button id="exportBtn" type="button" class="hidden" data-text-key="host_export_button">Export ZIP for iCloud</button>
        </div>

        <p id="status" class="muted">Enter host code to load files.</p>

        <div id="albumSection" class="hidden">
          <div class="toolbar">
            <span id="summary" class="muted"></span>
          </div>
          <table>
            <thead>
              <tr>
                <th>File</th>
                <th>Type</th>
                <th>Size</th>
                <th>Uploaded</th>
                <th>Download</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
          <p id="empty" class="empty hidden" data-text-key="host_empty">No uploads yet.</p>
        </div>
      </section>
    </main>

    <script src="./wedding-config.js"></script>
    <script>
      const cfg = window.WEDDING_CONFIG || {};
      const apiBase = (cfg.apiBaseUrl || "").replace(/\/$/, "");

      const titleEl = document.getElementById("title");
      const guestUrlEl = document.getElementById("guestUrl");
      const guestLinkEl = document.getElementById("guestLink");
      const codeInput = document.getElementById("codeInput");
      const continueBtn = document.getElementById("continueBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const exportBtn = document.getElementById("exportBtn");
      const statusEl = document.getElementById("status");
      const albumSection = document.getElementById("albumSection");
      const rowsEl = document.getElementById("rows");
      const emptyEl = document.getElementById("empty");
      const summaryEl = document.getElementById("summary");

      if (cfg.coupleNames) {
        titleEl.textContent = `${cfg.coupleNames} Host Dashboard`;
      }

      const guestUrl = cfg.guestUploadUrl || `${window.location.origin}/index.html`;
      guestUrlEl.textContent = guestUrl;
      guestLinkEl.href = guestUrl;

      let currentCode = "";

      const fmtBytes = (n) => {
        if (!n) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let value = n;
        let i = 0;
        while (value >= 1024 && i < units.length - 1) {
          value /= 1024;
          i += 1;
        }
        return `${value.toFixed(value >= 10 || i === 0 ? 0 : 1)} ${units[i]}`;
      };

      const fmtDate = (v) => {
        if (!v) return "-";
        return new Date(v).toLocaleString();
      };

      const inferType = (key) => {
        const lower = key.toLowerCase();
        if (/(\.jpg|\.jpeg|\.png|\.gif|\.webp|\.heic|\.heif)$/.test(lower)) return "Photo";
        if (/(\.mp4|\.mov|\.m4v|\.avi|\.webm|\.mkv)$/.test(lower)) return "Video";
        return "File";
      };

      const setStatus = (text, isError = false) => {
        statusEl.textContent = text;
        statusEl.style.color = isError ? "#9e1c1c" : "#62564d";
      };

      const renderRows = (files) => {
        rowsEl.innerHTML = "";
        if (!files.length) {
          emptyEl.classList.remove("hidden");
          return;
        }

        emptyEl.classList.add("hidden");

        files.forEach((file) => {
          const tr = document.createElement("tr");
          const filename = file.key.split("/").pop();
          tr.innerHTML = `
            <td>${filename}</td>
            <td>${inferType(file.key)}</td>
            <td>${fmtBytes(file.size)}</td>
            <td>${fmtDate(file.lastModified)}</td>
            <td><a href="${file.downloadUrl}" target="_blank" rel="noreferrer">Download original</a></td>
          `;
          rowsEl.appendChild(tr);
        });
      };

      const loadAlbum = async () => {
        if (!currentCode) {
          setStatus("Enter your host access code.", true);
          return;
        }

        try {
          setStatus("Loading album...");
          const url = `${apiBase}/api/list?eventSlug=${encodeURIComponent(cfg.eventSlug || "")}&code=${encodeURIComponent(currentCode)}`;
          const res = await fetch(url);

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            setStatus(data.error || "Could not load album.", true);
            return;
          }

          const data = await res.json();
          const files = data.files || [];

          albumSection.classList.remove("hidden");
          refreshBtn.classList.remove("hidden");
          exportBtn.classList.remove("hidden");
          renderRows(files);

          const totalBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
          summaryEl.textContent = `${files.length} file(s), ${fmtBytes(totalBytes)} total`;
          setStatus("Album loaded.");
        } catch (error) {
          setStatus("Could not reach the API. Start server.js and open host page on port 8787.", true);
        }
      };

      continueBtn.addEventListener("click", () => {
        currentCode = codeInput.value.trim();
        loadAlbum();
      });

      codeInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          currentCode = codeInput.value.trim();
          loadAlbum();
        }
      });

      refreshBtn.addEventListener("click", loadAlbum);

      exportBtn.addEventListener("click", () => {
        if (!currentCode) {
          setStatus("Enter your host access code.", true);
          return;
        }
        const url = `${apiBase}/api/export-zip?eventSlug=${encodeURIComponent(cfg.eventSlug || "")}&code=${encodeURIComponent(currentCode)}`;
        window.location.href = url;
      });
    </script>
    <script src="./ui-customizer.js"></script>
  </body>
</html>
